<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página principal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            padding: 20px;
        }

        .grid-banners {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            justify-items: center;
            padding-bottom: 40px;
        }

        .banner {
            width: 200px;
            height: 200px;
            background-color: #9b59b6;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            text-align: center;
            padding: 10px;
        }

        .banner:hover {
            background-color: #8e44ad;
            transform: scale(1.1);
        }

        .banner-title {
            font-size: 20px;
            font-weight: bold;
        }

        .banner-subtitle {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }

        /* MODAL (queda sin uso por ahora) */
        #modalAcceso {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-contenido {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Gestión de formatos por área o departamento</h1>

<div class="grid-banners">

    <div class="banner" onclick="pedirAcceso('direccion')">
        <div class="banner-title">Dirección</div>
    </div>

    <div class="banner" onclick="pedirAcceso('violencias')">
        <div class="banner-title">Subdirección de Atención a las Violencias</div>
    </div>

    <div class="banner" onclick="pedirAcceso('ppe')">
        <div class="banner-title">Departamento de Programas y Proyectos Estratégicos</div>
    </div>

    <div class="banner" onclick="pedirAcceso('comunidades')">
        <div class="banner-title">Mujeres en Comunidades</div>
        <div class="banner-subtitle">
            Desarrollo de las Mujeres en Comunidades
        </div>
    </div>

</div>

<!-- MODAL (queda preparado para después) -->
<div id="modalAcceso">
    <div class="modal-contenido">
        <h3>Acceso restringido</h3>
        <input type="text" id="numTrabajador" placeholder="Número de trabajador">
        <br>
        <button onclick="validar()">Ingresar</button>
        <button onclick="cerrarModal()">Cancelar</button>
        <div id="msgError" class="error"></div>
    </div>
</div>

<script>

var areaSeleccionada = "";

var permisos = {
    direccion: ["1001","1002"],
    violencias: ["2001","2002"],
    ppe: ["3001","3002"],
    comunidades: ["4001","4002"]
};

var links = {
    direccion: "menu_Direccion.html",
    violencias: "menu_SubD.html",
    ppe: "menu_PPE.html",
    comunidades: "menu_Mujeres_en_Comuindades.html"
};

// MIENTRAS SE VE LO DEL SERVIDOR: redirigir directo sin validación
function pedirAcceso(area) {
    areaSeleccionada = area;
    window.location.href = links[areaSeleccionada];
}

/*
// CUANDO SE VEA LO DEL SERVIDOR, usar esta versión:

function pedirAcceso(area) {
    areaSeleccionada = area;
    document.getElementById("modalAcceso").style.display = "flex";
    document.getElementById("msgError").innerText = "";
    document.getElementById("numTrabajador").value = "";
}
*/

function validar() {
    var num = document.getElementById("numTrabajador").value.trim();

    if(permisos[areaSeleccionada].includes(num)) {
        window.location.href = links[areaSeleccionada];
    } else {
        document.getElementById("msgError").innerText = "Acceso denegado";
    }
}

function cerrarModal() {
    document.getElementById("modalAcceso").style.display = "none";
}

</script>

</body>
</html>
