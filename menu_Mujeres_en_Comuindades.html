<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>menu_Mujeres_en_Comuindades.html</title>
    <link rel="icon" type="image/png" href="logo.png">


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eee;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            padding: 20px;
        }

        /* BOTÓN REGRESAR */
        .regresar {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 16px;
            color: #555;
            text-decoration: none;
        }

        .regresar:hover {
            text-decoration: underline;
        }

        /* GRID */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            justify-items: center;
            padding-bottom: 40px;
        }

        /* BOTONES */
        .boton {
            width: 200px;
            height: 200px;
            padding: 15px;
            background-color: #9b59b6;
            color: white;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;

            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            overflow: hidden;
            box-sizing: border-box;

        }

        .boton:hover {
            background-color: #8e44ad;
            transform: scale(1.08);
        }

        .vacio {
            background-color: #ccc;
            cursor: default;
        }

        .vacio:hover {
            transform: none;
            background-color: #ccc;
        }

        .titulo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitulo {
            font-size: 18px;
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

 /* BANNER CAPACITACIONES */
        .capacitaciones {
            grid-column: 1 / span 3;

            width: calc(100% - 80px);
            max-width: 1200px;
            min-height: 90px;

            background-color: #F594DD;
            color: white;
            border-radius: 16px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            box-sizing: border-box;
            padding: 18px;

            margin-top: 30px;   /* Cambia la altura de separación entre banners */

            transition: background-color 0.3s, transform 0.3s;
        }

        .capacitaciones:hover {
            background-color: #d43987;
            transform: scale(1.02);
        }

    </style>
</head>

<body>

    <a href="index.html" class="regresar">Regresar</a>

    <h1>Menú Mujeres en comunidades</h1>

    <div class="grid-menu">

        <!-- COMUNITARIO-->
        <a href="descargas1_MC_Comunitario.html">
            <div class="boton">
                <div class="titulo">Redes Comunitarias</div>
		<div class="subtitulo">
                    Formato para informe
            </div>
            </div>
        </a>
	
        <a href="descargas2_MC_PEA.html">
	<div class="boton">
                <div class="titulo">PEA</div>
		<div class="subtitulo">
                    Formato para informe
            </div>
            </div>
        </a>

        <a href="descargas3_MC_Autonomia.html">
	<div class="boton">
            <div class="titulo">Autonomía y empoderamiento</div>
		<div class="subtitulo">
                    Formato para informe
           	</div>
            </div>
        </a>

 <!-- CAPACITACIONES -->
        <a href="https://ee.kobotoolbox.org/x/V3sJzylB" class="capacitaciones" target="_blank">
            <div class="titulo">Capacitaciones</div>
            <div class="subtitulo">
                Redes Comunitarias, PEA o Autonomía y Empoderamiento
            </div>
        </a>

    </div>

</body>
</html>
