<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>descargas3_MC_Autonomia</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            padding: 20px;
        }

        .regresar {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 16px;
            color: #555;
            text-decoration: underline;
        }

        .grid-descargas {
            display: grid;
            grid-template-columns: repeat(1, 200px);
            gap: 15px;
            justify-content: center;
            padding-bottom: 40px;
        }

        .link-descarga {
            text-decoration: none;
            color: inherit;
        }

        /* Banner general */
        .banner {
            width: 200px;
            height: 200px;
            background-color: #9b59b6;
            color: white;
            font-size: 18px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 20px;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
        }

        .banner:hover {
            background-color: #8e44ad;
            transform: scale(1.05);
        }

        /* CONTENEDOR MENU */
        .menu-container {
            position: relative;
            width: 200px;
            margin: 0 auto;
        }

        /* SUBMENÚ A LA DERECHA */
        .submenu {
            display: none;
            position: absolute;
            top: 0;
            left: 220px;

            width: 180px;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;

            z-index: 50;
            padding-left: 10px;
        }

        /* Sub-banners (meses) */
        .mes {
            background-color: #b491d6;
            padding: 12px;
            border-radius: 10px;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .mes:hover {
            background-color: #9b59b6;
            transform: scale(1.05);
        }

        a { text-decoration: none; }
    </style>
</head>

<body>
        

    <a href="menu_Mujeres_en_Comuindades.html" class="regresar">Regresar</a>

    <h1>Descargar formatos</h1>

    <div class="grid-descargas">

 <!-- FORMATO INFORME AUT. Y EMP CON SUBMENÚ -->
        <div class="menu-container">
            <div class="banner" id="bannerMenu">
                Formato<br>Autonomía y Empoderamiento
            </div>

            <!-- SUBMENÚ -->
            <div class="submenu" id="submenu">
                <a href="https://docs.google.com/spreadsheets/d/1Vqj8PWAIb6yEgCLbMXyA5yEoA6kHj3zKEoPK5TehQLY/edit?gid=0#gid=0"><div class="mes">Enero</div></a>
                <a href="https://docs.google.com/spreadsheets/d/1-1uYZWbmRP2t8vFJQaarv6W0O7BO7sEPoRAoheDa3Kk/edit?gid=0#gid=0"><div class="mes">Febrero</div></a>
                <a href="#"><div class="mes">Marzo</div></a>
                <a href="#"><div class="mes">Abril</div></a>
                <a href="#"><div class="mes">Mayo</div></a>
                <a href="#"><div class="mes">Junio</div></a>
                <a href="#"><div class="mes">Julio</div></a>
                <a href="#"><div class="mes">Agosto</div></a>
                <a href="#"><div class="mes">Septiembre</div></a>
                <a href="#"><div class="mes">Octubre</div></a>
                <a href="#"><div class="mes">Noviembre</div></a>
                <a href="#"><div class="mes">Diciembre</div></a>
            </div>
        </div>


  <!-- SCRIPT PARA MOSTRAR/OCULTAR MENÚ -->
    <script>
        const bannerMenu = document.getElementById("bannerMenu");
        const submenu = document.getElementById("submenu");

        let menuVisible = false;

        bannerMenu.addEventListener("click", (event) => {
            event.stopPropagation();
            menuVisible = !menuVisible;
            submenu.style.display = menuVisible ? "grid" : "none";
        });

        submenu.addEventListener("click", (event) => {
            event.stopPropagation();
        });

        document.addEventListener("click", () => {
            submenu.style.display = "none";
            menuVisible = false;
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                submenu.style.display = "none";
                menuVisible = false;
            }
        });
    </script>

</body>
</html>
